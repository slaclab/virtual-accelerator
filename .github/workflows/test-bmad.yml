name: Test bmad extra

# Verifies the [bmad] optional extra installs and runs correctly.
# BMAD-backed tests (including FACET2) run; cheetah and surrogate tests skip.

on:
  push:

jobs:
  test-bmad:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Checkout lcls-lattice
        uses: actions/checkout@v4
        with:
          repository: slaclab/lcls-lattice
          ref: temp_remove_fixers
          path: lcls-lattice
      - name: Checkout facet2-lattice
        uses: actions/checkout@v4
        with:
          repository: slaclab/facet2-lattice
          ref: b1d170ebf51582c1dc675595d810f5191866a443
          path: facet2-lattice

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict
          activate-environment: va-env

      - name: Install pytao (includes bmad)
        run: conda install -y pytao

      - name: Install CPU-only PyTorch
        run: pip install --upgrade --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install package with bmad extra
        run: pip install ".[bmad,dev]"

      - name: List installed packages
        run: pip list

      - name: Verify bmad import works
        run: python -c "from lume_bmad.model import LUMEBmadModel; print('lume_bmad imported OK')"

      - name: Run bmad-profile tests only
        env:
          LCLS_LATTICE: ${{ github.workspace }}/lcls-lattice
          FACET2_LATTICE: ${{ github.workspace }}/facet2-lattice
        run: >
          pytest virtual_accelerator/tests
          -m "requires_bmad and not requires_surrogate and not requires_staged_model"
          -v --tb=short -ra --strict-markers
