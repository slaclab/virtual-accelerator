name: Test core install (no optional extras)

# Verifies that importing the package and running the test suite does NOT raise
# ImportErrors when no simulation backend extras are installed.  All
# backend-specific tests should be skipped, not errored.

on:
  push:

jobs:
  test-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU-only PyTorch
        run: pip install --upgrade --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install core package and dev dependencies (no extras)
        run: pip install ".[dev]"

      - name: List installed packages
        run: pip list

      - name: Run core-profile tests only
        run: >
          pytest virtual_accelerator/tests
          -m "not requires_bmad and not requires_surrogate and not requires_staged_model"
          -v --tb=short -ra --strict-markers
