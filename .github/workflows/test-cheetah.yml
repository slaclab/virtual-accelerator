name: Test cheetah extra

# Verifies the [cheetah] optional extra installs and runs correctly.
# TestCUHXRCheetah runs; bmad, surrogate, and staged-model tests skip.

on:
  push:

jobs:
  test-cheetah:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Checkout lcls-lattice
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          repository: slaclab/lcls-lattice
          ref: temp_remove_fixers
          path: lcls-lattice
      - name: Checkout facet2-lattice
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          repository: slaclab/facet2-lattice
          path: facet2-lattice
          ref: b1d170ebf51582c1dc675595d810f5191866a443
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU-only PyTorch
        run: pip install --upgrade --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install package with cheetah extra
        run: pip install ".[cheetah,dev]"

      - name: List installed packages
        run: pip list

      - name: Verify cheetah import works
        run: python -c "from lume_cheetah import LUMECheetahModel; print('lume_cheetah imported OK')"

      - name: Run cheetah smoke tests
        env:
          LCLS_LATTICE: ${{ github.workspace }}/lcls-lattice
          FACET2_LATTICE: ${{ github.workspace }}/facet2-lattice
        run: >
          pytest virtual_accelerator/tests/test_optional_dependencies.py
          virtual_accelerator/tests/test_cheetah_actions.py
          -v --tb=short -ra --strict-markers
