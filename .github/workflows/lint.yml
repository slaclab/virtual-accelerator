name: Lint
on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install pre-commit
        run: uv pip install pre-commit

      - name: List Python package versions
        run: uv pip list

      - name: Switch to a temporary branch
        run: |
          git checkout -b _ci_branch_

      - name: Run pre-commit on all files
        env:
          RUFF_OUTPUT_FORMAT: github
        run: |
          uv run pre-commit run \
            --show-diff-on-failure \
            --color=always \
            --all-files
